<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KVKZ P2P</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main: #795548; --bg: #f5f0eb; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; }
        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 10; }
        .tab { flex: 1; text-align: center; padding: 12px; font-weight: bold; color: #888; cursor: pointer; }
        .tab.active { color: var(--main); border-bottom: 2px solid var(--main); }
        
        .content { padding: 15px; }
        .ad-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .price { font-size: 1.3rem; font-weight: bold; color: #3e2723; }
        
        .input-group { margin: 10px 0; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--main); color: white; font-weight: bold; margin-top: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="showTab('market')">Маркет</div>
        <div class="tab" onclick="showTab('create')">Создать</div>
        <div class="tab" onclick="showTab('my')">Мои</div>
    </div>

    <div id="market" class="content">
        <div id="loader">🔄 Загрузка объявлений...</div>
        <div id="ads-container"></div>
    </div>

    <div id="create" class="content hidden">
        <h3>Создать объявление</h3>
        <div class="input-group">
            <label>Актив (USDT, TON)</label>
            <input type="text" id="new-asset" placeholder="USDT">
        </div>
        <div class="input-group">
            <label>Цена (RUB)</label>
            <input type="number" id="new-price" placeholder="95.5">
        </div>
        <div class="input-group">
            <label>Банк</label>
            <input type="text" id="new-bank" placeholder="Сбербанк">
        </div>
        <div class="input-group">
            <label>Реквизиты</label>
            <input type="text" id="new-card" placeholder="0000 0000 0000 0000">
        </div>
        <button class="btn" onclick="createNewAd()">Опубликовать</button>
    </div>

    <div id="my" class="content hidden">
        <p>Ваши активные объявления появятся здесь.</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const API_URL = 'https://subsoil-life-iron.ngrok-free.dev'; // ЗАМЕНИ НА СВОЮ
        const user = tg.initDataUnsafe?.user;

        function showTab(tabId) {
            document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.remove('hidden');
            event.target.classList.add('active');
            if (tabId === 'market') loadAds();
        }

        async function loadAds() {
            const container = document.getElementById('ads-container');
            try {
                const res = await fetch(`${API_URL}/api/ads`, { headers: {'ngrok-skip-browser-warning': 'true'} });
                const data = await res.json();
                document.getElementById('loader').style.display = 'none';
                
                container.innerHTML = data.ads.map(ad => `
                    <div class="ad-card">
                        <div style="font-size: 0.8rem; color: #888;">Мейкер: ★ ${ad.rating} | ${ad.bank}</div>
                        <div class="price">${ad.price} RUB</div>
                        <div class="input-group">
                            <input type="number" id="amt-${ad.id}" placeholder="Кол-во ${ad.asset}">
                        </div>
                        <button class="btn" onclick="buyAd(${ad.id})">Купить</button>
                    </div>
                `).join('');
            } catch (e) { container.innerText = "Ошибка загрузки"; }
        }

        async function createNewAd() {
            const payload = {
                user_id: user.id,
                asset: document.getElementById('new-asset').value,
                price: document.getElementById('new-price').value,
                bank: document.getElementById('new-bank').value,
                card: document.getElementById('new-card').value
            };
            const res = await fetch(`${API_URL}/api/create_ad`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) { tg.showAlert("Создано!"); showTab('market'); }
        }

        async function buyAd(adId) {
            const amount = document.getElementById(`amt-${adId}`).value;
            if (!amount) return tg.showAlert("Введите количество!");

            const res = await fetch(`${API_URL}/api/request_deal`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ad_id: adId, buyer_id: user.id, amount: amount })
            });
            if (res.ok) tg.showAlert("Запрос отправлен продавцу!");
        }

        loadAds();
    </script>
</body>
</html>
