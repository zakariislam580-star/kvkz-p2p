<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 12px; background: #0088cc; color: white; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ads"></div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API = 'https://subsoil-life-iron.ngrok-free.dev'; // <--- ОБНОВИ ЭТО

        async function load() {
            const res = await fetch(`${API}/api/ads`, {headers: {'ngrok-skip-browser-warning': 'true'}});
            const data = await res.json();
            const cont = document.getElementById('ads');
            cont.innerHTML = data.ads.map(ad => `
                <div class="card">
                    <b>${ad.bank}</b> | ${ad.asset}<br>
                    <h3>${ad.price} RUB</h3>
                    <button class="btn" onclick="buy(${ad.id})">Купить</button>
                </div>
            `).join('');
        }

        async function buy(id) {
            const user = tg.initDataUnsafe?.user;
            if (!user) return tg.showAlert("Ошибка: Запустите через бота!");

            const res = await fetch(`${API}/api/request_deal`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ad_id: id, buyer_id: user.id, buyer_name: user.first_name })
            });
            const result = await res.json();
            if (result.status === 'ok') tg.showAlert("Запрос отправлен! Ждите ответа в боте.");
            else tg.showAlert("Ошибка: " + result.message);
        }
        load();
    </script>
</body>
</html>
