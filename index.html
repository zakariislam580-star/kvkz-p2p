<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KVKZ P2P Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f4f9; margin: 0; padding: 15px; color: #333; }
        h2 { text-align: center; color: #0088cc; margin-top: 10px; }
        
        #ads-container { width: 100%; max-width: 500px; margin: 0 auto; }
        
        .ad-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        
        .ad-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .bank-badge { font-size: 0.75rem; color: #666; background: #eee; padding: 2px 8px; border-radius: 4px; }
        .asset-name { font-weight: bold; color: #444; }
        
        .price { font-size: 1.4rem; font-weight: bold; color: #0088cc; margin-bottom: 4px; }
        .limits { font-size: 0.85rem; color: #888; margin-bottom: 12px; }
        
        .buy-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #0088cc;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        .buy-btn:active { background: #0077b3; transform: scale(0.98); }

        /* Страница сделки */
        #deal-page {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 2000;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .back-btn { color: #0088cc; text-decoration: none; font-weight: bold; display: block; margin-bottom: 20px; }
        .reks-box {
            background: #f8f9fa;
            border: 2px dashed #0088cc;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            cursor: pointer;
        }
        .reks-box:active { background: #eef7ff; }
        .reks-box b { font-size: 1.2rem; letter-spacing: 1px; color: #222; }
        
        .total-amount { font-size: 2rem; font-weight: bold; text-align: center; margin: 20px 0; color: #28a745; }
        
        #loader { text-align: center; margin-top: 50px; color: #999; }
    </style>
</head>
<body>

    <div id="main-page">
        <h2>KVKZ P2P</h2>
        <div id="loader">Загрузка объявлений...</div>
        <div id="ads-container"></div>
    </div>

    <div id="deal-page">
        <a href="#" class="back-btn" onclick="closeDeal()">← Назад</a>
        <h3>Оплата заявки</h3>
        <p style="font-size: 0.9rem; color: #666;">Ордер забронирован. Переведите рубли по реквизитам ниже:</p>
        
        <div class="reks-box" onclick="copyCard()">
            <small>Банк получателя:</small><br>
            <span id="deal-bank" style="font-weight: bold; color: #0088cc;">—</span><br><br>
            <small>Номер карты (нажми, чтобы скопировать):</small><br>
            <b id="deal-card">0000 0000 0000 0000</b>
        </div>

        <div class="total-amount" id="deal-price">0 RUB</div>

        <button class="buy-btn" style="background: #28a745;" onclick="confirmPay()">Я ОПЛАТИЛ (RUB)</button>
        
        <p style="font-size: 0.75rem; color: #999; text-align: center; margin-top: 20px;">
            ⚠️ Если вы не оплатите в течение 15 минут, ордер вернется в общий список.
        </p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ЗАМЕНИ ССЫЛКУ НА СВОЙ NGROK
        const API_URL = 'https://subsoil-life-iron.ngrok-free.dev'; 
        let currentAdId = null;

        async function loadAds() {
            const container = document.getElementById('ads-container');
            const loader = document.getElementById('loader');

            try {
                const response = await fetch(`${API_URL}/api/ads`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const data = await response.json();

                loader.style.display = 'none';
                container.innerHTML = '';

                if (data.status === 'ok' && data.ads.length > 0) {
                    data.ads.forEach(ad => {
                        const card = document.createElement('div');
                        card.className = 'ad-card';
                        card.innerHTML = `
                            <div class="ad-header">
                                <span class="asset-name">${ad.asset}</span>
                                <span class="bank-badge">${ad.bank}</span>
                            </div>
                            <div class="price">${ad.price} RUB</div>
                            <div class="limits">Лимит: ${ad.min_limit} - ${ad.max_limit} RUB</div>
                            <button class="buy-btn" onclick="openDeal(${ad.id}, '${ad.bank}', '${ad.card}', '${ad.price}', '${ad.asset}')">
                                Купить
                            </button>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    loader.innerHTML = 'Активных объявлений нет 📭';
                }
            } catch (err) {
                loader.innerHTML = '<span style="color:red;">Ошибка соединения</span>';
            }
        }

        // ПУНКТ №2: Бронирование ордера при открытии
        async function openDeal(id, bank, card, price, asset) {
            try {
                const response = await fetch(`${API_URL}/api/reserve_ad`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ad_id: id })
                });
                const result = await response.json();

                if (result.status === 'ok') {
                    currentAdId = id;
                    document.getElementById('deal-bank').innerText = bank;
                    document.getElementById('deal-card').innerText = card;
                    document.getElementById('deal-price').innerText = `${price} RUB`;
                    
                    document.getElementById('main-page').style.display = 'none';
                    document.getElementById('deal-page').style.display = 'block';
                } else {
                    tg.showAlert("Извините, этот ордер только что забронировали.");
                    loadAds();
                }
            } catch (e) {
                tg.showAlert("Ошибка сервера при бронировании.");
            }
        }

        function closeDeal() {
            document.getElementById('deal-page').style.display = 'none';
            document.getElementById('main-page').style.display = 'block';
            currentAdId = null;
            loadAds(); // Обновляем список, чтобы увидеть актуальные ордера
        }

        function copyCard() {
            const cardNum = document.getElementById('deal-card').innerText;
            navigator.clipboard.writeText(cardNum).then(() => {
                tg.showAlert("Номер скопирован!");
            });
        }

        async function confirmPay() {
            if (!currentAdId) return;

            tg.showPopup({
                title: 'Подтверждение оплаты',
                message: 'Вы отправили деньги продавцу?',
                buttons: [
                    {id: 'yes', type: 'default', text: 'Да, оплатил'},
                    {id: 'no', type: 'destructive', text: 'Отмена'}
                ]
            }, async (buttonId) => {
                if (buttonId === 'yes') {
                    try {
                        const response = await fetch(`${API_URL}/api/confirm_payment`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ ad_id: currentAdId })
                        });

                        const result = await response.json();

                        if (result.status === 'ok') {
                            tg.showAlert("Уведомление отправлено продавцу!");
                            closeDeal();
                        }
                    } catch (e) {
                        tg.showAlert("Ошибка при подтверждении.");
                    }
                }
            });
        }

        loadAds();
    </script>
</body>
</html>
