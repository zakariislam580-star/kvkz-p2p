<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KVKZ P2P Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --accent: #8D6E63; --bg: #F5F5F0; --text: #3E2723; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        
        .header { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #E0E0D1; }
        .nav { display: flex; background: #fff; position: sticky; top: 0; border-bottom: 1px solid #E0E0D1; z-index: 10; }
        .nav-item { flex: 1; text-align: center; padding: 15px; font-weight: 600; color: #A1887F; cursor: pointer; }
        .nav-item.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        .card { background: #fff; margin: 12px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #E0E0D1; }
        .price { font-size: 26px; font-weight: 800; margin: 5px 0; }
        .bank-tag { background: #EFEBE9; color: var(--accent); padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: 700; }
        
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1.5px solid #D7CCC8; box-sizing: border-box; outline: none; font-size: 16px; }
        .btn-buy { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 700; font-size: 16px; cursor: pointer; }
        
        #ton-connect { display: flex; justify-content: center; padding: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header"><h1 style="margin:0; font-size:20px;">KVKZ MARKET</h1></div>
    <div id="ton-connect"></div>

    <div class="nav">
        <div class="nav-item active" onclick="switchTab('buy', this)">Купить</div>
        <div class="nav-item" onclick="switchTab('create', this)">Создать</div>
    </div>

    <div id="market-tab" class="content"></div>

    <div id="create-tab" class="content hidden" style="padding:15px;">
        <input type="text" id="asset" placeholder="Актив (USDT/TON)">
        <input type="number" id="price" placeholder="Цена (RUB)">
        <input type="text" id="bank" placeholder="Банк">
        <textarea id="card" placeholder="Реквизиты карты"></textarea>
        <button class="btn-buy" onclick="publish()">Опубликовать</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const API = "https://subsoil-life-iron.ngrok-free.dev";
        const user = tg.initDataUnsafe?.user;

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://zakariislam580-star.github.io/kvkz-p2p/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        function switchTab(tab, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('market-tab').classList.toggle('hidden', tab === 'create');
            document.getElementById('create-tab').classList.toggle('hidden', tab === 'buy');
            if(tab === 'buy') loadMarket();
        }

        async function loadMarket() {
            const res = await fetch(`${API}/api/market`);
            const data = await res.json();
            document.getElementById('market-tab').innerHTML = data.ads.map(ad => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between">
                        <span class="bank-tag">${ad.bank}</span>
                        <span style="font-weight:700">★ ${ad.rating}</span>
                    </div>
                    <div class="price">${ad.price} RUB</div>
                    <input type="number" id="amt-${ad.id}" placeholder="Количество ${ad.asset}">
                    <button class="btn-buy" onclick="makeDeal(${ad.id}, ${ad.owner}, ${ad.price}, '${ad.asset}')">Купить</button>
                </div>
            `).join('');
        }

        async function publish() {
            const body = {
                user_id: user.id, username: user.username,
                asset: document.getElementById('asset').value,
                price: document.getElementById('price').value,
                bank: document.getElementById('bank').value,
                card: document.getElementById('card').value
            };
            await fetch(`${API}/api/create_ad`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
            tg.showAlert("Опубликовано!");
            switchTab('buy', document.querySelector('.nav-item'));
        }

        async function makeDeal(id, owner, price, asset) {
            const amount = document.getElementById(`amt-${id}`).value;
            if(!amount) return tg.showAlert("Введите сумму");
            await fetch(`${API}/api/request_deal`, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ owner_id: owner, amount, price, asset })
            });
            tg.showAlert("Запрос отправлен продавцу!");
        }

        tg.expand();
        loadMarket();
    </script>
</body>
</html>
