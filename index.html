<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVKZ P2P Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #ffffff; color: #000; text-align: center; padding: 40px 20px; }
        #ton-connect-button { display: flex; justify-content: center; margin-bottom: 20px; }
        .info { background: #f4f4f4; padding: 15px; border-radius: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>KVKZ P2P</h1>
    <div id="ton-connect-button"></div>
    <div class="info" id="status">Ожидание подключения кошелька...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/zakariislam580-star/kvkz-p2p/refs/heads/main/tonconnect-manifest.json?v=2',
            buttonRootId: 'ton-connect-button'
        });

        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                document.getElementById('status').innerText = 'Кошелек: ' + wallet.account.address.substring(0, 8) + '...';
            }
        });
    </script>
</body>
</html>
