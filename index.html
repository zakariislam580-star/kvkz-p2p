<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KVKZ P2P Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 15px; 
            color: #333; 
        }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h2 { margin: 0; color: #0088cc; font-size: 1.4rem; }

        .ad-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .ad-info { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .bank-label { font-weight: 600; color: #666; font-size: 0.9rem; }
        .asset-label { font-weight: 800; color: #0088cc; }

        .price-text { font-size: 1.5rem; font-weight: 800; margin: 10px 0; }

        .buy-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #0088cc;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }

        .buy-btn:active { transform: scale(0.98); opacity: 0.9; }

        #loader { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>

    <div class="header">
        <h2>KVKZ P2P</h2>
        <div style="font-size: 0.8rem; color: #28a745;">● Online</div>
    </div>

    <div id="loader">Загрузка объявлений...</div>
    <div id="ads-container"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // !!! ЗАМЕНИ ЭТУ ССЫЛКУ НА СВОЮ АКТУАЛЬНУЮ ИЗ NGROK !!!
        const API_URL = 'https://subsoil-life-iron.ngrok-free.dev'; 

        async function loadAds() {
            const container = document.getElementById('ads-container');
            const loader = document.getElementById('loader');
            
            try {
                const response = await fetch(`${API_URL}/api/ads`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const data = await response.json();
                
                loader.style.display = 'none';
                container.innerHTML = '';

                if (data.status === 'ok' && data.ads.length > 0) {
                    data.ads.forEach(ad => {
                        const card = document.createElement('div');
                        card.className = 'ad-card';
                        card.innerHTML = `
                            <div class="ad-info">
                                <span class="bank-label">${ad.bank}</span>
                                <span class="asset-label">${ad.asset}</span>
                            </div>
                            <div class="price-text">${ad.price} RUB</div>
                            <button class="buy-btn" onclick="requestDeal(${ad.id})">Купить</button>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = '<div style="text-align:center; color:#999;">Активных ордеров нет</div>';
                }
            } catch (err) {
                loader.innerHTML = 'Ошибка подключения к API. Проверьте ngrok.';
                console.error(err);
            }
        }

        async function requestDeal(adId) {
            tg.HapticFeedback.impactOccurred('medium');

            // Получаем данные пользователя из Telegram
            const user = tg.initDataUnsafe?.user;
            
            if (!user || !user.id) {
                tg.showAlert("Ошибка: Запустите приложение через Telegram бота");
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/request_deal`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        ad_id: adId, 
                        buyer_id: user.id,
                        buyer_name: user.first_name || "Пользователь"
                    })
                });

                if (!response.ok) {
                    throw new Error(`Статус сервера: ${response.status}`);
                }

                const result = await response.json();

                if (result.status === 'ok') {
                    tg.showAlert("✅ Запрос отправлен продавцу! Дождитесь уведомления в боте.");
                } else {
                    tg.showAlert("❌ Ошибка: " + (result.message || "Неизвестная ошибка"));
                }
            } catch (error) {
                tg.showAlert("🛰 Ошибка связи с сервером. Убедитесь, что API запущен и ссылка в index.html верна.\n\n" + error.message);
            }
        }

        // Запуск при открытии
        loadAds();
    </script>
</body>
</html>
