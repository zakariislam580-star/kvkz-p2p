<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVKZ P2P Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        #ton-connect-button { margin-bottom: 20px; }
        .ad-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; width: 100%; max-width: 400px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .price { font-size: 1.2rem; font-weight: bold; color: #0088cc; }
        .error-box { color: #d32f2f; background: #ffebee; padding: 15px; border-radius: 8px; font-size: 0.9rem; width: 100%; max-width: 400px; word-break: break-all; }
        #loader { color: #666; margin-top: 50px; }
    </style>
</head>
<body>

    <div id="ton-connect-button"></div>
    <div id="loader">Загрузка объявлений...</div>
    <div id="ads-container"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. ПРОВЕРЬ ЭТУ ССЫЛКУ! Она должна быть в точности как в терминале ngrok
        const API_URL = 'https://subsoil-life-iron.ngrok-free.dev'; 

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/zakariislam580-star/kvkz-p2p/refs/heads/main/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function loadAds() {
            const container = document.getElementById('ads-container');
            const loader = document.getElementById('loader');

            try {
                const response = await fetch(`${API_URL}/api/ads`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'ngrok-skip-browser-warning': 'true' // Пропускаем окно ngrok
                    }
                });

                if (!response.ok) throw new Error(`Сервер ответил кодом: ${response.status}`);

                const data = await response.json();
                loader.style.display = 'none';

                if (data.status === 'ok' && data.ads.length > 0) {
                    data.ads.forEach(ad => {
                        const card = document.createElement('div');
                        card.className = 'ad-card';
                        card.innerHTML = `
                            <div style="display:flex; justify-content:space-between">
                                <b>${ad.type === 'sell' ? 'ПРОДАЖА' : 'ПОКУПКА'}</b>
                                <span>${ad.asset}</span>
                            </div>
                            <div class="price">${ad.price} ${ad.currency}</div>
                            <div style="font-size:0.8rem; color: #666">Лимит: ${ad.min_limit} - ${ad.max_limit}</div>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    loader.innerHTML = 'Объявлений пока нет 📭';
                }
            } catch (err) {
                console.error(err);
                loader.innerHTML = `
                    <div class="error-box">
                        <b>❌ Ошибка загрузки:</b><br>
                        ${err.message}<br><br>
                        <small>Проверь, что API запущен и ссылка в коде совпадает с ngrok.</small>
                    </div>
                `;
            }
        }

        loadAds();
    </script>
</body>
</html>
